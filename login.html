<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #667eea;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .logo i { font-size: 24px; color: white; }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    .input-wrap { position: relative; }

    .input-wrap i.left-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #aaa;
      pointer-events: none;
    }

    input[type=text],
    input[type=password] {
      width: 100%;
      padding: 11px 40px 11px 38px;
      font-size: 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      background: #f9f9f9;
      color: #1a1a2e;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 16px;
      padding: 0;
    }

    .eye-btn:hover { color: #667eea; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #667eea;
      margin-top: 6px;
      cursor: pointer;
      text-decoration: none;
    }

    .forgot:hover { text-decoration: underline; }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s, transform 0.1s;
    }

    .login-btn:hover { background: #5a6fd6; }
    .login-btn:active { transform: scale(0.98); }

    #message {
      margin-top: 1rem;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    .success-msg {
      background: #e8f5e9;
      color: #2e7d32;
      display: block !important;
    }

    .error-msg {
      background: #fdecea;
      color: #c62828;
      display: block !important;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0;
    }

    .divider span {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }

    .signup {
      text-align: center;
      font-size: 13px;
      color: #888;
    }

    .signup a {
      color: #667eea;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
    }

    .signup a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <i class="ti ti-bolt"></i>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <i class="ti ti-user left-icon"></i>
        <input type="text" id="username" placeholder="Enter your username" />
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="ti ti-lock left-icon"></i>
        <input type="password" id="password" placeholder="Enter your password" />
        <button type="button" class="eye-btn" onclick="togglePass()" aria-label="Toggle password visibility">
          <i class="ti ti-eye" id="eyeIcon"></i>
        </button>
      </div>
      <a class="forgot">Forgot password?</a>
    </div>

    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign in</button>

    <div id="message"></div>

    <div class="divider"><span>don't have an account?</span></div>
    <p class="signup"><a>Create a free account</a></p>
  </div>

  <script>
    function togglePass() {
      const p = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (p.type === 'password') {
        p.type = 'text';
        icon.className = 'ti ti-eye-off';
      } else {
        p.type = 'password';
        icon.className = 'ti ti-eye';
      }
    }

    function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');
      message.className = '';
      message.style.display = 'none';

      if (!username || !password) {
        message.textContent = 'Please fill in all fields!';
        message.className = 'error-msg';
      } else if (username === 'admin' && password === 'admin123') {
        message.textContent = 'Login successful! Welcome back, Admin!';
        message.className = 'success-msg';
      } else {
        message.textContent = 'Invalid username or password. Please try again.';
        message.className = 'error-msg';
      }
    }
  </script>

</body>
</html>
